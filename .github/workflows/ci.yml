name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Tests are fully offline (no RPC / network calls). CI never reaches the Pharos
# testnet — contract addresses are null and the suites use fixtures.
jobs:
  node:
    name: build · lint · test (node)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

  contracts:
    name: forge build · test (foundry)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/contracts
    steps:
      - uses: actions/checkout@v4

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Forge version
        run: forge --version

      - name: Forge build
        run: forge build

      - name: Forge test
        run: forge test -vvv
