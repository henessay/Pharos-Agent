[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc = "0.8.28"
optimizer = true
optimizer_runs = 200
remappings = ["forge-std/=lib/forge-std/src/", "solady/=lib/solady/src/"]
fs_permissions = [{ access = "read-write", path = "./" }]

# Pharos Testnet profile (chain id 688688).
# Usage: FOUNDRY_PROFILE=pharos_testnet forge build
[profile.pharos_testnet]
src = "src"
out = "out"
libs = ["lib"]
optimizer = true
optimizer_runs = 200
remappings = ["forge-std/=lib/forge-std/src/", "solady/=lib/solady/src/"]

[rpc_endpoints]
pharos_testnet = "${PHAROS_RPC_URL}"

# Block explorer (Pharosscan, Blockscout-compatible) for contract verification.
[etherscan]
pharos_testnet = { key = "${EXPLORER_API_KEY}", chain = 688688, url = "https://testnet.pharosscan.xyz/api" }

[fmt]
line_length = 100
tab_width = 4
bracket_spacing = true
